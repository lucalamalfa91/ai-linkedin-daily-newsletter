<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coding Tools Digest — {{ DATE }}</title>
  <meta name="description" content="The 5 most important AI coding tool updates, analyzed daily by Claude.">
  <meta property="og:title" content="AI Coding Tools Digest — {{ DATE }}">
  <meta property="og:description" content="5 stories. Daily analysis by Claude.">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #F4F3EF;
      --surface:       #FFFFFF;
      --border:        #E4E3DF;
      --text:          #111111;
      --text-sub:      #444444;
      --text-muted:    #888888;
      --accent:        #2563EB;
      --header-bg:     #0D1117;
      --header-sub:    rgba(255,255,255,0.45);
      --header-strong: rgba(255,255,255,0.85);
      --take-bg:       #FFFBEB;
      --take-border:   #F59E0B;
      --take-label:    #92400E;
      --source-bg:     #EFEFEB;
      --source-text:   #333333;
      --score-bg:      #ECFDF5;
      --score-text:    #065F46;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #101010;
        --surface:       #1A1A1A;
        --border:        #2B2B2B;
        --text:          #EFEFEF;
        --text-sub:      #AAAAAA;
        --text-muted:    #666666;
        --accent:        #60A5FA;
        --header-bg:     #000000;
        --header-sub:    rgba(255,255,255,0.35);
        --header-strong: rgba(255,255,255,0.85);
        --take-bg:       #1A1200;
        --take-border:   #D97706;
        --take-label:    #FCD34D;
        --source-bg:     #222222;
        --source-text:   #CCCCCC;
        --score-bg:      #042F2E;
        --score-text:    #6EE7B7;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
    }

    /* ── MASTHEAD ───────────────────────────────────────── */
    .masthead {
      background: var(--header-bg);
      padding: 3rem 1.25rem 2.5rem;
      text-align: center;
    }

    .masthead-inner { max-width: 640px; margin: 0 auto; }

    .masthead-eyebrow {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--header-sub);
      margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
    }

    .masthead h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #FFFFFF;
      margin-bottom: 0.6rem;
      line-height: 1.1;
    }

    .masthead-sub {
      font-size: 0.875rem;
      color: var(--header-sub);
    }

    .masthead-sub strong { color: var(--header-strong); }

    .masthead-divider {
      width: 40px;
      height: 2px;
      background: rgba(255,255,255,0.12);
      margin: 1.25rem auto 0;
      border-radius: 2px;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .container {
      max-width: 660px;
      margin: 0 auto;
      padding: 2.25rem 1.25rem 1rem;
    }

    .feed-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    /* ── STORY CARD ─────────────────────────────────────── */
    .story-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .story-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border-color: #C8C7C3;
    }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid var(--border);
    }

    .card-body { padding: 1.4rem 1.5rem 1.3rem; }

    /* Top row: rank · source · score */
    .card-top {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }

    .rank-badge {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.18rem 0.5rem;
      border-radius: 5px;
      letter-spacing: 0.03em;
    }

    .source-chip {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--source-bg);
      color: var(--source-text);
      padding: 0.18rem 0.65rem;
      border-radius: 20px;
    }

    .score-chip {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--score-bg);
      color: var(--score-text);
      padding: 0.18rem 0.65rem;
      border-radius: 20px;
      margin-left: auto;
    }

    /* Title */
    .story-title {
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.015em;
      margin-bottom: 0.3rem;
    }

    .story-title a { color: var(--text); text-decoration: none; }
    .story-title a:hover { color: var(--accent); }

    /* Date */
    .story-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 0.9rem;
    }

    /* Summary */
    .story-summary {
      font-size: 0.9rem;
      color: var(--text-sub);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    /* Claude's take */
    .claude-take {
      background: var(--take-bg);
      border-left: 3px solid var(--take-border);
      border-radius: 0 8px 8px 0;
      padding: 0.8rem 1rem;
      margin-bottom: 1.1rem;
    }

    .claude-take-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--take-label);
      margin-bottom: 0.4rem;
    }

    .claude-take-text {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.62;
    }

    /* Read link */
    .read-link {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .read-link:hover { text-decoration: underline; }

    /* ── FOOTER ─────────────────────────────────────────── */
    .site-footer {
      max-width: 660px;
      margin: 1rem auto 0;
      padding: 1.5rem 1.25rem 2.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.9;
    }

    /* ── MOBILE ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .masthead h1     { font-size: 1.55rem; }
      .card-body       { padding: 1.1rem; }
      .card-image      { height: 160px; }
    }
  </style>
</head>
<body>

  <header class="masthead">
    <div class="masthead-inner">
      <span class="masthead-eyebrow">Daily Digest</span>
      <h1>AI Coding Tools Digest</h1>
      <p class="masthead-sub">
        <strong>{{ DATE }}</strong> &mdash; 5 stories selected and analyzed by Claude
      </p>
      <div class="masthead-divider"></div>
    </div>
  </header>

  <div class="container">
    <p class="feed-label">Today&rsquo;s top stories</p>
    <main>
{{ STORIES_HTML }}
    </main>
  </div>

  <footer class="site-footer">
    Updated daily at 5&nbsp;AM UTC &middot; Curated and analyzed by Claude &middot; Last updated: {{ GENERATED_AT }}
  </footer>

</body>
</html>
